name: hms-production

services:
  db:
    image: postgres:15-alpine@sha256:3d0f7584ed7d04e27fa050d6683a74746608faf21f202be78460d679cc56461f
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hms_internal

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MASTER_MFA_KEY: ${MASTER_MFA_KEY:?MASTER_MFA_KEY is required}
      AUDIT_CHAIN_SECRET: ${AUDIT_CHAIN_SECRET:?AUDIT_CHAIN_SECRET is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      REDIS_TLS_CA_BASE64: ${REDIS_TLS_CA_BASE64:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required in production-equivalent mode}
      # Notification providers: mock is rejected at startup when NODE_ENV=production.
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:?EMAIL_PROVIDER is required (ses or mailrelay; mock forbidden in production)}
      SMS_PROVIDER: ${SMS_PROVIDER:?SMS_PROVIDER is required (semaphore; mock forbidden in production)}
      AWS_REGION: ${AWS_REGION:-}
      SES_SENDER_EMAIL: ${SES_SENDER_EMAIL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      MAILRELAY_SMTP_HOST: ${MAILRELAY_SMTP_HOST:-}
      MAILRELAY_SMTP_PORT: ${MAILRELAY_SMTP_PORT:-465}
      MAILRELAY_SMTP_USER: ${MAILRELAY_SMTP_USER:-}
      MAILRELAY_SMTP_PASS: ${MAILRELAY_SMTP_PASS:-}
      MAILRELAY_SENDER_EMAIL: ${MAILRELAY_SENDER_EMAIL:-}
      MAILRELAY_SENDER_NAME: ${MAILRELAY_SENDER_NAME:-}
      SEMAPHORE_API_KEY: ${SEMAPHORE_API_KEY:-}
      SEMAPHORE_API_URL: ${SEMAPHORE_API_URL:-}
      SEMAPHORE_SENDER_NAME: ${SEMAPHORE_SENDER_NAME:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - hms_internal

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - hms_internal

volumes:
  postgres_prod_data:

networks:
  hms_internal:
    driver: bridge
