services:
  postgres_prod:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-hms_prod_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hms_secure_pass}
      POSTGRES_DB: ${DB_NAME:-gemini_hms_prod}
    volumes:
      - hms_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hms_prod_user} -d ${DB_NAME:-gemini_hms_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./hms-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-hms_prod_user}:${DB_PASSWORD:-hms_secure_pass}@postgres_prod:5432/${DB_NAME:-gemini_hms_prod}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      postgres_prod:
        condition: service_healthy

volumes:
  hms_postgres_prod_data:
