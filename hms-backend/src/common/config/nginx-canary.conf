# ==============================================================================
# ENTERPRISE CANARY ROLLING RELEASES: DYNAMIC NGINX TRAFFIC SPLITTER
# ==============================================================================

upstream hms_backend_cluster {
    # Stable Production Cluster: weight=95
    server backend_stable:3000 weight=95 max_fails=3 fail_timeout=10s;
    
    # Canary Release Sandbox: weight=5
    server backend_canary:3000 weight=5 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://hms_backend_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cleanly mirror tracking headers, tenant boundaries, and authorization tokens
        proxy_set_header x-tenant-id $http_x_tenant_id;
        proxy_set_header Authorization $http_authorization;
        
        # Enable connection pooling and keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
