# ==============================================================================
# HMS INGRESS CONTROLLER - DYNAMIC TRAFFIC-SPLITTING CANARY RELEASE BLOCK
# ==============================================================================

upstream hms_production {
    server app-stable-1:3000;
    server app-stable-2:3000;
}

upstream hms_canary {
    server app-canary-1:3000;
}

# Explicit split weighting array: 95% Stable, 5% Canary
split_clients "${remote_addr}${remote_port}" $hms_upstream_pool {
    95%     hms_production;
    5%      hms_canary;
    *       hms_production; # Absolute explicit fail-safe fallback
}

server {
    listen 80;
    server_name hms-core.internal;

    location / {
        # Secure explicit mapping to upstream variable resolution pool
        proxy_pass http://$hms_upstream_pool;
        
        # Ensure active tenant context is absolutely preserved natively across the routing ring
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Tenant-ID $http_x_tenant_id;
        
        # High performance timeout constraints mapping
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
