name: Production Docker Build (Manual Check)

on:
  workflow_dispatch:
  # Disabling automatic triggers to reduce redundancy with ci.yml
  # push:
  #   branches:
  #     - main
  # pull_request:
  #   branches:
  #     - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Image Tag
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=ghcr.io/${REPO_LOWER}/hms-backend:latest" >> $GITHUB_OUTPUT

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./hms-backend
          file: ./hms-backend/Dockerfile
          push: false
          tags: ${{ steps.prep.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

