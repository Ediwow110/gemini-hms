name: Staging Deployment

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  docker-build:
    name: Build Immutable Staging Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build staging backend image
        uses: docker/build-push-action@v6
        with:
          context: ./hms-backend
          file: ./hms-backend/Dockerfile
          load: true
          tags: hms-backend:staging-${{ github.sha }}
          cache-from: type=gha,scope=backend-staging
          cache-to: type=gha,mode=max,scope=backend-staging

      - name: Build staging frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./hms-frontend
          file: ./hms-frontend/Dockerfile
          load: true
          tags: hms-frontend:staging-${{ github.sha }}
          cache-from: type=gha,scope=frontend-staging
          cache-to: type=gha,mode=max,scope=frontend-staging

      - name: Package exact CI-built images
        run: |
          docker save hms-backend:staging-${GITHUB_SHA} | gzip -9 > hms-backend.tar.gz
          docker save hms-frontend:staging-${GITHUB_SHA} | gzip -9 > hms-frontend.tar.gz
          sha256sum hms-backend.tar.gz hms-frontend.tar.gz > images.sha256

      - name: Attest backend staging artifact
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: hms-backend.tar.gz

      - name: Attest frontend staging artifact
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: hms-frontend.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: hms-staging-${{ github.sha }}
          path: |
            hms-backend.tar.gz
            hms-frontend.tar.gz
            images.sha256
          if-no-files-found: error
          retention-days: 7

  cd-deploy-staging:
    name: SSH Staging Delivery
    runs-on: ubuntu-latest
    needs: docker-build
    environment: Staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: hms-staging-${{ github.sha }}
          path: release-images

      - name: Deploy exact CI-built images to staging
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          BACKEND_IMAGE: hms-backend:staging-${{ github.sha }}
          FRONTEND_IMAGE: hms-frontend:staging-${{ github.sha }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.STAGING_JWT_REFRESH_SECRET }}
          MASTER_MFA_KEY: ${{ secrets.STAGING_MASTER_MFA_KEY }}
          AUDIT_CHAIN_SECRET: ${{ secrets.STAGING_AUDIT_CHAIN_SECRET }}
          REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}
          REDIS_TLS_CA_BASE64: ${{ secrets.STAGING_REDIS_TLS_CA_BASE64 }}
          DB_USER: ${{ secrets.STAGING_DB_USER }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          DB_NAME: ${{ secrets.STAGING_DB_NAME }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.STAGING_CORS_ORIGINS }}
          EMAIL_PROVIDER: ${{ secrets.STAGING_EMAIL_PROVIDER }}
          SMS_PROVIDER: ${{ secrets.STAGING_SMS_PROVIDER }}
          AWS_REGION: ${{ secrets.STAGING_AWS_REGION }}
          SES_SENDER_EMAIL: ${{ secrets.STAGING_SES_SENDER_EMAIL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.STAGING_AWS_SESSION_TOKEN }}
          MAILRELAY_SMTP_HOST: ${{ secrets.STAGING_MAILRELAY_SMTP_HOST }}
          MAILRELAY_SMTP_PORT: ${{ secrets.STAGING_MAILRELAY_SMTP_PORT }}
          MAILRELAY_SMTP_USER: ${{ secrets.STAGING_MAILRELAY_SMTP_USER }}
          MAILRELAY_SMTP_PASS: ${{ secrets.STAGING_MAILRELAY_SMTP_PASS }}
          MAILRELAY_SENDER_EMAIL: ${{ secrets.STAGING_MAILRELAY_SENDER_EMAIL }}
          MAILRELAY_SENDER_NAME: ${{ secrets.STAGING_MAILRELAY_SENDER_NAME }}
          SEMAPHORE_API_KEY: ${{ secrets.STAGING_SEMAPHORE_API_KEY }}
          SEMAPHORE_API_URL: ${{ secrets.STAGING_SEMAPHORE_API_URL }}
          SEMAPHORE_SENDER_NAME: ${{ secrets.STAGING_SEMAPHORE_SENDER_NAME }}
          SENTRY_DSN: ${{ secrets.STAGING_SENTRY_DSN }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" "mkdir -p /tmp/app/hms-backend/scripts"
          scp -i ~/.ssh/id_rsa release-images/* "$SSH_USER@$SSH_HOST:/tmp/app/"
          scp -i ~/.ssh/id_rsa docker-compose.staging.yml "$SSH_USER@$SSH_HOST:/tmp/app/"
          scp -i ~/.ssh/id_rsa hms-backend/scripts/remote-deploy-staging.sh "$SSH_USER@$SSH_HOST:/tmp/app/hms-backend/scripts/"
          scp -i ~/.ssh/id_rsa hms-backend/scripts/load-deploy-environment.sh "$SSH_USER@$SSH_HOST:/tmp/app/hms-backend/scripts/"

          ssh -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" "cd /tmp/app && sha256sum -c images.sha256 && gunzip -c hms-backend.tar.gz | docker load && gunzip -c hms-frontend.tar.gz | docker load"

          deploy_env="$(mktemp)"
          chmod 600 "$deploy_env"
          for variable in BACKEND_IMAGE FRONTEND_IMAGE DATABASE_URL JWT_SECRET JWT_REFRESH_SECRET MASTER_MFA_KEY AUDIT_CHAIN_SECRET REDIS_URL REDIS_TLS_CA_BASE64 DB_USER DB_PASSWORD DB_NAME CORS_ALLOWED_ORIGINS EMAIL_PROVIDER SMS_PROVIDER AWS_REGION SES_SENDER_EMAIL AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN MAILRELAY_SMTP_HOST MAILRELAY_SMTP_PORT MAILRELAY_SMTP_USER MAILRELAY_SMTP_PASS MAILRELAY_SENDER_EMAIL MAILRELAY_SENDER_NAME SEMAPHORE_API_KEY SEMAPHORE_API_URL SEMAPHORE_SENDER_NAME SENTRY_DSN; do
            printf '%s_B64=%s\n' "$variable" "$(printf '%s' "${!variable:-}" | base64 -w0)" >> "$deploy_env"
          done
          scp -i ~/.ssh/id_rsa "$deploy_env" "$SSH_USER@$SSH_HOST:/tmp/app/.deploy-env"
          rm -f "$deploy_env"

          ssh -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" "cd /tmp/app && bash ./hms-backend/scripts/load-deploy-environment.sh .deploy-env bash ./hms-backend/scripts/remote-deploy-staging.sh"
