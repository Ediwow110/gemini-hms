name: Staging Deployment

on:
  workflow_dispatch:

jobs:
  docker-build:
    name: Build Staging Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Staging Backend Container
        uses: docker/build-push-action@v5
        with:
          context: ./hms-backend
          file: ./hms-backend/Dockerfile
          push: false
          tags: hms-login-design-backend:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Staging Frontend Container
        uses: docker/build-push-action@v5
        with:
          context: ./hms-frontend
          file: ./hms-frontend/Dockerfile
          push: false
          tags: hms-login-design-frontend:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cd-deploy-staging:
    name: SSH Staging Delivery
    runs-on: ubuntu-latest
    needs: docker-build
    environment: Staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging Host
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.STAGING_JWT_REFRESH_SECRET }}
          MASTER_MFA_KEY: ${{ secrets.STAGING_MASTER_MFA_KEY }}
          DB_USER: ${{ secrets.STAGING_DB_USER }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          DB_NAME: ${{ secrets.STAGING_DB_NAME }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.STAGING_CORS_ORIGINS }}
        run: |
          echo "=== STAGING DEPLOYMENT ==="
          echo "Target: $SSH_USER@$SSH_HOST"
          echo "Environment: staging"

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_rsa $SSH_USER@$SSH_HOST "mkdir -p /tmp/app"
          rsync -avz -e "ssh -i ~/.ssh/id_rsa" \
            --exclude 'node_modules' \
            --exclude '.git' \
            ./hms-backend \
            ./hms-frontend \
            docker-compose.staging.yml \
            $SSH_USER@$SSH_HOST:/tmp/app/

          ssh -i ~/.ssh/id_rsa $SSH_USER@$SSH_HOST \
            "cd /tmp/app && \
             export DB_USER='$DB_USER' \
             DB_PASSWORD='$DB_PASSWORD' \
             DB_NAME='$DB_NAME' \
             CORS_ALLOWED_ORIGINS='$CORS_ALLOWED_ORIGINS' \
             DATABASE_URL='$DATABASE_URL' \
             JWT_SECRET='$JWT_SECRET' \
             MASTER_MFA_KEY='$MASTER_MFA_KEY'; \
             bash ./hms-backend/scripts/remote-deploy-staging.sh"
