name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for committed node_modules
        run: |
          if git ls-files node_modules | grep -q .; then
            echo "Error: node_modules committed to repository."
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    needs: guard
    defaults:
      run:
        working-directory: ./hms-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './hms-frontend/package-lock.json'
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    needs: guard
    defaults:
      run:
        working-directory: ./hms-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './hms-backend/package-lock.json'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run build
      - run: npm run test
