name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '22.x'

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Backend Analysis
        working-directory: ./hms-backend
        run: |
          npm ci
          npx prisma generate
          npm run lint
          npm run typecheck
          npm run typecheck:tests

      - name: Frontend Analysis
        working-directory: ./hms-frontend
        run: |
          npm ci
          npm run lint
          npm run typecheck

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hms_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Backend Install & Test
        working-directory: ./hms-backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/hms_test?schema=public
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm run test
          npm run test:e2e

      - name: Migration Upgrade Tests
        working-directory: ./hms-backend
        timeout-minutes: 20
        env:
          # Admin connection URL — the script creates its own disposable database
          DATABASE_URL: postgresql://postgres:password@localhost:5432/postgres
        run: |
          ALLOW_DESTRUCTIVE_MIGRATION_TEST=true npx tsx scripts/verify-migration-upgrade.ts

      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: hms-backend/coverage/

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Frontend Install & Test
        working-directory: ./hms-frontend
        run: |
          npm ci
          npm run test -- --run

  browser-smoke:
    name: Browser Smoke (Playwright)
    runs-on: ubuntu-latest
    needs: [static-analysis]
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:15-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hms_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare backend database and server
        working-directory: ./hms-backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/hms_test?schema=public
          JWT_SECRET: test-secret-key-for-e2e-tests-that-is-long-enough
          JWT_REFRESH_SECRET: test-refresh-secret-for-e2e-tests
          NODE_ENV: test
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npx tsx prisma/seed.ts
          npm run build
          npm run start:prod &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/v1/health > /dev/null; then
              echo "Backend healthy"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:3000/api/v1/health

      - name: Install frontend and Playwright
        working-directory: ./hms-frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run production-readiness browser smoke
        working-directory: ./hms-frontend
        run: |
          npm run dev &
          for i in $(seq 1 45); do
            if curl -sf http://localhost:5173 > /dev/null; then
              echo "Frontend ready"
              break
            fi
            sleep 2
          done
          npm run test:smoke

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [static-analysis, backend-tests, frontend-tests, browser-smoke]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t hms-backend ./hms-backend

      - name: Build Frontend Docker Image
        run: docker build -t hms-frontend ./hms-frontend
