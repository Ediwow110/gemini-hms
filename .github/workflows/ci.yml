name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for committed node_modules
        run: |
          if git ls-files node_modules | grep -q .; then
            echo "Error: node_modules committed to repository."
            exit 1
          fi

      - name: Hardening Verification Guards
        run: |
          if grep -rn 'SUPER_SECRET_TEMP_KEY_DO_NOT_USE_IN_PROD' hms-backend/src/; then echo "Fallback secret found" && exit 1; fi
          if grep -rn 'process.env.JWT_SECRET ||' hms-backend/src/; then echo "Fallback logic found" && exit 1; fi
          if grep -rn "recipient: 'PHARMACY_MANAGER'" hms-backend/src/; then echo "Hardcoded PHARMACY_MANAGER found" && exit 1; fi
          if grep -rn "findFirst({ where: { email }" hms-backend/src/auth/auth.service.ts; then echo "Email-only lookup found" && exit 1; fi
          if ! grep -rn 'tenantCode' hms-backend/src/auth/dto/login.dto.ts && ! grep -rn 'tenantId' hms-backend/src/auth/dto/login.dto.ts; then echo "tenantCode/tenantId missing in login.dto.ts" && exit 1; fi
          if ! grep -rn 'role: { tenantId' hms-backend/src/auth/guards/permissions.guard.ts; then echo "tenantId missing in permissions.guard.ts role lookup" && exit 1; fi
          if grep -rn "this.audit.log({" hms-backend/src/inventory/inventory.service.ts | grep -v "tx"; then echo "audit.log without tx found in inventory.service.ts" && exit 1; fi
          echo "All hardening guards passed!"

  frontend:
    runs-on: ubuntu-latest
    needs: guard
    defaults:
      run:
        working-directory: ./hms-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './hms-frontend/package-lock.json'
      - run: npm ci
      - name: Run Dependency Vulnerability Audit
        run: npm audit --audit-level=critical
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    needs: guard
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gemini_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./hms-backend
    env:
      DATABASE_URL:\ \$\{\{\ secrets\.CI_DATABASE_URL\ }}
      JWT_SECRET:\ \$\{\{\ secrets\.CI_JWT_SECRET\ }}
      JWT_REFRESH_SECRET:\ \$\{\{\ secrets\.CI_JWT_REFRESH_SECRET\ }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './hms-backend/package-lock.json'
      - run: npm ci
      - name: Run Dependency Vulnerability Audit
        run: npm audit --audit-level=critical
      - name: Validate Prisma Schema
        run: npx prisma validate
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run build
      - run: npx prisma migrate deploy
      - name: Run Unit Tests with Coverage Threshold
        run: npm run test -- --coverage
      - run: npm run test:e2e -- --runInBand



