name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20.x'

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Backend Analysis
        working-directory: ./hms-backend
        run: |
          npm ci
          npx prisma generate
          npm run lint
          npm run typecheck

      - name: Frontend Analysis
        working-directory: ./hms-frontend
        run: |
          npm ci
          npm run lint
          npm run typecheck

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hms_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Backend Install & Test
        working-directory: ./hms-backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/hms_test?schema=public
        run: |
          npm ci
          npx prisma generate
          npm run test
          npm run test:e2e

      - name: Migration Upgrade Tests
        working-directory: ./hms-backend
        timeout-minutes: 10
        env:
          # Admin connection URL — the script creates its own disposable database
          DATABASE_URL: postgresql://postgres:password@localhost:5432/postgres
        run: |
          ALLOW_DESTRUCTIVE_MIGRATION_TEST=true npx tsx scripts/verify-migration-upgrade.ts

      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: hms-backend/coverage/

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Frontend Install & Test
        working-directory: ./hms-frontend
        run: |
          npm ci
          npm run test -- --run

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [static-analysis, backend-tests, frontend-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t hms-backend ./hms-backend

      - name: Build Frontend Docker Image
        run: docker build -t hms-frontend ./hms-frontend
