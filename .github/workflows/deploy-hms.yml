name: Validate HMS Foundational Core

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hms-foundational-core
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Secure Dependencies
        run: npm ci

      - name: Execute Strict TypeScript Build Bounds Check
        run: npx tsc --noEmit

      - name: Prisma Schema Syntax Validation
        run: npx prisma validate --schema=../hms-backend/prisma/schema.prisma

      - name: Deployment path notice
        run: |
          echo "Foundational core validation passed."
          echo "Production releases must use .github/workflows/deploy.yml so the exact CI-built images, full release gates, required secrets, and rollback orchestrator are enforced."
