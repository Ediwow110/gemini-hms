# WARNING: Do NOT store real secrets in this file.
# Use External Secrets Operator, HashiCorp Vault, or sealed-secrets.
# This file exists only as a template for the required secret keys.
# 
# Required secrets:
#   - DATABASE_URL
#   - JWT_SECRET
#   - MASTER_MFA_KEY
#   - AUDIT_CHAIN_SECRET
#   - REDIS_URL
#
# To create manually (NOT recommended for production):
#   kubectl create secret generic hms-secrets \
#     --from-literal=DATABASE_URL='<value>' \
#     --from-literal=JWT_SECRET='<value>' \
#     --from-literal=MASTER_MFA_KEY='<value>' \
#     --from-literal=AUDIT_CHAIN_SECRET='<value>' \
#     --from-literal=REDIS_URL='<value>' \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: hms-secrets
  namespace: hms
  labels:
    app: hms-backend
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_VIA_EXTERNAL_SECRETS_MANAGER"
  JWT_SECRET: "REPLACE_VIA_EXTERNAL_SECRETS_MANAGER"
  MASTER_MFA_KEY: "REPLACE_VIA_EXTERNAL_SECRETS_MANAGER"
  AUDIT_CHAIN_SECRET: "REPLACE_VIA_EXTERNAL_SECRETS_MANAGER"
  REDIS_URL: "REPLACE_VIA_EXTERNAL_SECRETS_MANAGER"
